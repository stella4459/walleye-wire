kind = "web"
previewPath = "/"
title = "The Walleye Wire"
version = "1.0.0"
id = "artifacts/walleye-wire"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8082

[services.development]
run = "pnpm --filter @workspace/walleye-wire run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/walleye-wire", "run", "build" ]
publicDir = "artifacts/walleye-wire/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8082"
BASE_PATH = "/"
