[build]
builder = "nixpacks"
buildCommand = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/walleye-wire run build && pnpm --filter @workspace/api-server run build"

[build.env]
NODE_ENV = "production"
BASE_PATH = "/"
PORT = "3000"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
